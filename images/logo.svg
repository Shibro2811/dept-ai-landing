<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="60" y1="0" x2="60" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A8AF4"/>
      <stop offset="100%" stop-color="#2B6BF2"/>
    </linearGradient>
    <clipPath id="squircle">
      <rect width="120" height="120" rx="28" ry="28"/>
    </clipPath>
  </defs>
  <!-- Blue squircle background -->
  <rect width="120" height="120" rx="28" ry="28" fill="url(#bgGrad)"/>
  <!-- Folded corner -->
  <g clip-path="url(#squircle)">
    <path d="M82 0 L120 0 L120 38 Z" fill="#1a1a2e"/>
    <path d="M82 0 L120 38 L82 38 Z" fill="#253a6e" opacity="0.7"/>
    <!-- Grid lines on fold -->
    <line x1="86" y1="4" x2="86" y2="34" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="94" y1="2" x2="94" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="102" y1="0" x2="102" y2="24" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="110" y1="0" x2="110" y2="16" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="84" y1="10" x2="116" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="88" y1="20" x2="116" y2="20" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="96" y1="30" x2="116" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <!-- AI text on fold -->
    <text x="100" y="22" text-anchor="middle" fill="white" font-size="14" font-weight="600" font-family="Inter, sans-serif" opacity="0.9">AI</text>
  </g>
  <!-- dp text -->
  <text x="52" y="88" text-anchor="middle" fill="white" font-size="62" font-weight="700" font-family="Inter, sans-serif" letter-spacing="-2">dp</text>
</svg>
